  <circle cx="47" cy="18" r="5" fill="url(#accent)" />
  <circle cx="18" cy="45" r="4.5" fill="#9be7ff" />
  <circle cx="18" cy="45" r="7.5" fill="none" stroke="rgba(155,231,255,0.28)" stroke-width="2" />
