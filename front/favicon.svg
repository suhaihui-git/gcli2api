<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">su2api Icon</title>
  <desc id="desc">Rounded square icon with an S-shaped proxy route and two signal nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="10" y1="8" x2="54" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17324a" />
      <stop offset="0.6" stop-color="#1f4868" />
      <stop offset="1" stop-color="#2a6a7f" />
    </linearGradient>
    <linearGradient id="mark" x1="16" y1="16" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7fbff" />
      <stop offset="0.52" stop-color="#8ae3ff" />
